name: Sync Instagram Posts

on:
  schedule:
    # Runs every day at 07:00 UTC (10:00 Istanbul time)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit posts.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Instagram posts via Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node fetch-instagram.js

      - name: Commit and push posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json ig-images/
          if git diff --staged --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: sync Instagram posts $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          fi
